<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Infinite square well — the n² energy ladder</title>
<style>
  :root{ --ink:#121212; --secondary:#545454; --border:#D4D4D4;
         --wall:#121212; --level:#0072B2; --ground:#D55E00; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#fff;color:var(--ink);font-family:Arial,Helvetica,sans-serif}
  #chart{width:100%;max-width:620px;margin:0 auto}
  .lab{fill:var(--ink);font-size:12px}
  .lab.mono{font-family:'JetBrains Mono',monospace;fill:var(--secondary);font-size:11px}
</style>
</head>
<body>
<div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
// Figure (Vol 1, Ch 5, Critical/PQ): the infinite square well's quantized
// spectrum, E_n = n^2 E_1.  Levels are drawn at heights proportional to n^2
// inside the well's hard walls — the gaps grow as 3,5,7,9 (the odd numbers).
function draw(){
  const el=document.getElementById('chart'); el.innerHTML='';
  const W=el.clientWidth||600, H=Math.round(W*0.92);
  const m={top:24,right:120,bottom:40,left:64};
  const iw=W-m.left-m.right, ih=H-m.top-m.bottom;
  const svg=d3.select('#chart').append('svg').attr('width',W).attr('height',H)
    .attr('role','img').attr('aria-labelledby','t d');
  svg.append('title').attr('id','t').text('Infinite square well energy spectrum');
  svg.append('desc').attr('id','d').text('Five quantized energy levels at heights proportional to n squared inside two hard walls; the spacing grows with n.');
  const g=svg.append('g').attr('transform',`translate(${m.left},${m.top})`);

  const N=5, Emax=N*N + 3;
  const y=d3.scaleLinear().domain([0,Emax]).range([ih,0]); // energy axis, zero baseline
  // y-axis (energy in units of E_1)
  g.append('g').call(d3.axisLeft(y).tickValues([0,1,4,9,16,25]).tickFormat(d=>d===0?'0':d+'E₁'))
    .selectAll('text').attr('class','lab mono');
  g.append('text').attr('class','lab').attr('transform','rotate(-90)').attr('x',0).attr('y',-46)
    .attr('text-anchor','end').attr('fill','var(--secondary)').text('energy  E');

  // hard walls (left/right) and floor
  const x0=10, x1=iw-10;
  [x0,x1].forEach(xx=>g.append('line').attr('x1',xx).attr('x2',xx).attr('y1',y(0)).attr('y2',y(Emax))
    .attr('stroke','var(--wall)').attr('stroke-width',3));
  g.append('line').attr('x1',x0).attr('x2',x1).attr('y1',y(0)).attr('y2',y(0)).attr('stroke','var(--wall)').attr('stroke-width',3);

  // energy levels at E_n = n^2
  for(let n=1;n<=N;n++){
    const E=n*n, col = n===1?'var(--ground)':'var(--level)';
    g.append('line').attr('x1',x0).attr('x2',x1).attr('y1',y(E)).attr('y2',y(E))
      .attr('stroke',col).attr('stroke-width',n===1?3:2);
    g.append('text').attr('class','lab').attr('x',x1+10).attr('y',y(E)+4).attr('fill',col)
      .text(`n=${n},  E=${E}E₁`);
    if(n<N){ // gap annotation (odd-number spacing)
      const gap=(n+1)*(n+1)-E;
      g.append('text').attr('class','lab mono').attr('x',x0+14).attr('y',(y(E)+y((n+1)*(n+1)))/2+4)
        .text(`Δ = ${gap}E₁`);
    }
  }
}
draw();
new ResizeObserver(()=>draw()).observe(document.getElementById('chart'));
</script>
</body>
</html>
