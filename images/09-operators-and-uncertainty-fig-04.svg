  <title id="fig-title-09-04">Robertson uncertainty boundary: σ_x·σ_p ≥ ℏ/2 on log-log axes</title>
  <desc>Log-log plot of position uncertainty σ_x versus momentum uncertainty σ_p showing the hyperbolic Robertson boundary σ_xσ_p=ℏ/2. The forbidden region below is shaded red. A green dot marks the Gaussian minimum-uncertainty state on the boundary; an orange dot marks the infinite-square-well ground state above the boundary with an upward arrow showing increasing n moves further from the bound.</desc>
