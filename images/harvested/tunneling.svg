<svg role="img" aria-labelledby="t-tunneling d-tunneling" viewBox="0 0 560 400" xmlns="http://www.w3.org/2000/svg">
  <title id="t-tunneling">Quantum tunneling through a barrier</title>
  <desc id="d-tunneling">A particle with energy below a barrier height oscillates on the left, decays exponentially inside the classically forbidden barrier, and emerges on the right with small but nonzero amplitude. The surviving transmitted wave is the signature of tunneling.</desc>
  <metadata><provenance>CANDIDATE · CAJAL PALETTE · QM VOL 1</provenance></metadata>
  <rect x="0" y="0" width="560" height="400" fill="#FFFFFF"/>
