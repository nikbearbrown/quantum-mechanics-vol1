<svg role="img" aria-labelledby="t-infinite-square-well d-infinite-square-well" viewBox="0 0 560 400" xmlns="http://www.w3.org/2000/svg">
  <title id="t-infinite-square-well">Infinite square well: discrete energy levels and the first three wavefunctions</title>
  <desc id="d-infinite-square-well">Inside an infinite well of width L, energies are quantized as E_n proportional to n squared. The first three stationary states are sinusoids with one, two, and three antinodes, each vanishing at both walls.</desc>
