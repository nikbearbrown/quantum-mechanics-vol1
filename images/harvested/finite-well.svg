<svg role="img" aria-labelledby="t-finite-well d-finite-well" viewBox="0 0 560 400" xmlns="http://www.w3.org/2000/svg">
  <title id="t-finite-well">Finite square well: a bound state with exponentially decaying tails</title>
  <desc id="d-finite-well">A finite-depth well of depth V naught holds bound states whose energies sit below the rim. Inside, the wavefunction is sinusoidal; outside, it does not vanish but decays exponentially, leaking into the classically forbidden region.</desc>
  <metadata><provenance>CANDIDATE · CAJAL PALETTE · QM VOL 1</provenance></metadata>
  <rect x="0" y="0" width="560" height="400" fill="#FFFFFF"/>
  <text x="28" y="30" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Finite Well: Bound State with Leaking Tails</text>
  <rect x="40" y="50" width="490" height="300" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <!-- potential well (finite depth) -->
  <line x1="40" y1="110" x2="180" y2="110" stroke="#2a1a0e" stroke-width="2"/>
  <line x1="180" y1="110" x2="180" y2="300" stroke="#2a1a0e" stroke-width="2"/>
  <line x1="180" y1="300" x2="380" y2="300" stroke="#2a1a0e" stroke-width="2"/>
  <line x1="380" y1="300" x2="380" y2="110" stroke="#2a1a0e" stroke-width="2"/>
  <line x1="380" y1="110" x2="530" y2="110" stroke="#2a1a0e" stroke-width="2"/>
  <text x="50" y="104" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">V = 0 (outside)</text>
  <text x="280" y="316" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454" text-anchor="middle">−V₀</text>
  <!-- energy level dashed -->
  <line x1="110" y1="240" x2="450" y2="240" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4,3"/>
  <text x="460" y="244" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">E &lt; 0</text>
