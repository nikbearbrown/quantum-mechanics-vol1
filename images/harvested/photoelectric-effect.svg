<svg role="img" aria-labelledby="t-photoelectric-effect d-photoelectric-effect" viewBox="0 0 560 400" xmlns="http://www.w3.org/2000/svg">
  <title id="t-photoelectric-effect">Photoelectric effect: maximum electron energy versus light frequency</title>
  <desc id="d-photoelectric-effect">Maximum kinetic energy of ejected electrons is zero below a threshold frequency, then rises linearly with frequency at slope h. The intercept on the frequency axis is the threshold; the vertical intercept relates to the work function.</desc>
  <metadata><provenance>CANDIDATE · CAJAL PALETTE · QM VOL 1</provenance></metadata>
  <defs>
    <marker id="ar-pe" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2a1a0e"/></marker>
  </defs>
  <rect x="0" y="0" width="560" height="400" fill="#FFFFFF"/>
  <text x="28" y="30" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">The Photoelectric Threshold</text>
  <rect x="80" y="56" width="420" height="280" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="80" y1="126" x2="500" y2="126" stroke="#D4D4D4" stroke-width="0.5"/>
  <line x1="80" y1="196" x2="500" y2="196" stroke="#D4D4D4" stroke-width="0.5"/>
  <line x1="80" y1="266" x2="500" y2="266" stroke="#D4D4D4" stroke-width="0.5"/>
  <line x1="80" y1="336" x2="500" y2="336" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="80" y1="56" x2="80" y2="336" stroke="#2a1a0e" stroke-width="1.5"/>
  <!-- flat zero below threshold (greyscale) -->
  <line x1="80" y1="336" x2="220" y2="336" stroke="#787878" stroke-width="2"/>
  <!-- linear rise above threshold, slope h. RED must-look -->
  <line x1="220" y1="336" x2="470" y2="100" stroke="#C8102E" stroke-width="2.5"/>
  <!-- threshold marker -->
  <line x1="220" y1="336" x2="220" y2="346" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="220" y="362" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454" text-anchor="middle">ν₀</text>
  <!-- slope annotation -->
  <text x="250" y="140" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#C8102E">slope = h</text>
  <text x="250" y="162" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e">K_max = hν − φ</text>
  <text x="118" y="322" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">no electrons</text>
  <text x="280" y="378" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">light frequency  ν  →</text>
  <text x="50" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle" transform="rotate(-90 50 200)">max electron energy  K_max</text>
  <text x="76" y="350" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454" text-anchor="end">0</text>
  
</svg>
