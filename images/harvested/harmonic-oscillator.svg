  <!-- equally spaced levels inside parabola -->
  <line x1="262" y1="218" x2="298" y2="218" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="240" y1="190" x2="320" y2="190" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="222" y1="162" x2="338" y2="162" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="206" y1="134" x2="354" y2="134" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="192" y1="106" x2="368" y2="106" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="420" y="222" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">E₀ = ½ℏω</text>
  <text x="420" y="194" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">E₁ = 3⁄2 ℏω</text>
  <text x="420" y="166" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">E₂</text>
  <text x="420" y="138" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">E₃</text>
