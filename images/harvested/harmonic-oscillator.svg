  <text x="28" y="30" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">The Quantum Harmonic Oscillator</text>
  <rect x="40" y="46" width="490" height="304" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
