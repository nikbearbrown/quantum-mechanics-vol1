<svg role="img" aria-labelledby="t-harmonic-oscillator d-harmonic-oscillator" viewBox="0 0 560 400" xmlns="http://www.w3.org/2000/svg">
  <title id="t-harmonic-oscillator">Quantum harmonic oscillator: equally spaced energy levels and the Gaussian ground state</title>
  <desc id="d-harmonic-oscillator">A parabolic potential supports energy levels equally spaced by h-bar omega, beginning at the zero-point energy one-half h-bar omega. The ground state is a single Gaussian bump centred in the well.</desc>
