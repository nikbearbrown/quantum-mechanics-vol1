<svg role="img" aria-labelledby="t-wave-packet d-wave-packet" viewBox="0 0 560 400" xmlns="http://www.w3.org/2000/svg">
  <title id="t-wave-packet">Free-particle wave packet: carrier wave inside a Gaussian envelope, group versus phase velocity</title>
  <desc id="d-wave-packet">A localized wave packet is a fast oscillating carrier wave modulated by a slowly varying Gaussian envelope. The envelope, which carries the probability, moves at the group velocity; the individual ripples move at the phase velocity.</desc>
