  <text x="350" y="72" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454" text-anchor="middle">iℏ ∂Ψ/∂t = Ĥ Ψ(x,t)   [coupled PDE]</text>

  <!-- Arrow 1→2 -->
  <line x1="350" y1="82" x2="350" y2="98" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow-ch4-01-down)"/>

