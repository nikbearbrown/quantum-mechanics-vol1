  <text x="175" y="336" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454" text-anchor="middle">dφ/dt = −(iE/ℏ)φ</text>
  <text x="175" y="354" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#C8860E" text-anchor="middle">φ(t) = e^{−iEt/ℏ}</text>
