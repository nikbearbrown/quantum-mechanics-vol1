  <rect x="170" y="100" width="360" height="44" fill="#56B4E9" fill-opacity="0.20" stroke="#56B4E9" stroke-width="1"/>
  <text x="350" y="117" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="13" fill="#2a1a0e" text-anchor="middle">Product ansatz substitution</text>
  <text x="350" y="133" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454" text-anchor="middle">Ψ(x,t) = ψ(x) · φ(t)   [assume separable]</text>

