  <title id="fig-title-ch4-01">Separation of variables flowchart: TDSE splits into time ODE and TISE</title>
  <desc>A vertical flowchart showing five stages: the full time-dependent Schrödinger equation (PDE), the product ansatz substitution, the separated form with time-only left side and space-only right side, a fork at the separation constant E, and two branches yielding the analytic time solution and the time-independent Schrödinger eigenvalue equation.</desc>
